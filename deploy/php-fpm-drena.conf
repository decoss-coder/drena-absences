; ═══════════════════════════════════════════════════════════
; PHP-FPM Pool — DRENA Absences
; Fichier : /etc/php/8.3/fpm/pool.d/drena.conf
; Optimisé pour Hostinger VPS KVM 4 (4 vCPU, 8 Go RAM)
; ═══════════════════════════════════════════════════════════

[drena]
user = www-data
group = www-data

listen = /var/run/php/php8.3-drena-fpm.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Pool dynamique
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 8
pm.max_requests = 500

; Timeouts
request_terminate_timeout = 60
request_slowlog_timeout = 10

; Logs
slowlog = /var/log/php/drena-slow.log
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/php/drena-error.log

; Security
php_admin_value[expose_php] = Off
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen
php_admin_value[open_basedir] = /var/www/drena-app:/tmp
php_admin_value[upload_max_filesize] = 10M
php_admin_value[post_max_size] = 12M
php_admin_value[max_execution_time] = 60
php_admin_value[memory_limit] = 256M

; OPcache (améliore les performances x3-5)
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 128
php_admin_value[opcache.max_accelerated_files] = 10000
php_admin_value[opcache.validate_timestamps] = 0
php_admin_value[opcache.revalidate_freq] = 0

; Sessions
php_admin_value[session.gc_maxlifetime] = 1800
php_admin_value[session.cookie_httponly] = 1
php_admin_value[session.cookie_secure] = 1
php_admin_value[session.cookie_samesite] = Lax
